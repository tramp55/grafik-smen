<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title> <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/1995/1995572.png">График смен</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/1995/1995572.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; padding: 16px; }
        .container { max-width: 1400px; margin: 0 auto; background: white; border-radius: 24px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); overflow: hidden; }
        header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px 24px; }
        h1 { font-size: 1.8rem; margin-bottom: 16px; }
        .tabs { display: flex; gap: 12px; flex-wrap: wrap; }
        .tab-btn { background: rgba(255,255,255,0.2); border: none; padding: 10px 20px; border-radius: 30px; color: white; font-size: 1rem; cursor: pointer; transition: all 0.3s; }
        .tab-btn.active { background: white; color: #667eea; }
        .tab-content { display: none; padding: 24px; }
        .tab-content.active { display: block; }
        .schedule-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 24px; }
        .calendar-section, .add-shift-section { background: #f9f9f9; padding: 20px; border-radius: 20px; }
        .selected-date { margin-top: 16px; padding: 12px; background: #e0e7ff; border-radius: 12px; text-align: center; font-weight: bold; }
        .worker-select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 12px; font-size: 1rem; background: white; cursor: pointer; }
        .shift-types { display: flex; gap: 10px; margin: 15px 0; flex-wrap: wrap; }
        .shift-type-btn { flex: 1; min-width: 80px; padding: 10px; border: none; border-radius: 10px; cursor: pointer; transition: all 0.3s; font-weight: 500; }
        .shift-type-btn[data-type="Дневная"] { background: #fef3c7; color: #92400e; }
        .shift-type-btn[data-type="Ночная"] { background: #e0e7ff; color: #3730a3; }
        .shift-type-btn[data-type="Выходной"] { background: #fee2e2; color: #dc2626; }
        .shift-type-btn[data-type="Суточная"] { background: #d1fae5; color: #065f46; }
        .shift-type-btn.active { box-shadow: 0 0 0 2px white, 0 0 0 4px currentColor; }
        .btn-add { width: 100%; padding: 12px; background: #10b981; color: white; border: none; border-radius: 12px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .import-export-section { grid-column: 1 / -1; display: flex; gap: 12px; flex-wrap: wrap; margin-top: 10px; }
        .import-export-section button { background: #f59e0b; color: white; padding: 10px 20px; border: none; border-radius: 10px; cursor: pointer; }
        .google-cal-btn { background: #4285f4 !important; }
        .shifts-list { grid-column: 1 / -1; margin-top: 20px; }
        .shifts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; margin-top: 15px; }
        .shift-card { background: white; border: 1px solid #e5e7eb; border-radius: 14px; padding: 15px; display: flex; justify-content: space-between; align-items: center; transition: all 0.2s; position: relative; overflow: hidden; }
        .shift-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; }
        .shift-card[data-type="Дневная"]::before { background: #f59e0b; }
        .shift-card[data-type="Ночная"]::before { background: #6366f1; }
        .shift-card[data-type="Выходной"]::before { background: #ef4444; }
        .shift-card[data-type="Суточная"]::before { background: #10b981; }
        .shift-info { display: flex; align-items: center; gap: 12px; }
        .worker-avatar { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; background: #667eea; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.2rem; font-weight: bold; }
        .shift-details { flex: 1; }
        .shift-date { font-weight: bold; color: #4b5563; margin-bottom: 5px; font-size: 0.85rem; }
        .shift-worker { font-size: 1rem; font-weight: 600; margin-bottom: 5px; }
        .shift-type { display: inline-block; padding: 4px 10px; border-radius: 8px; font-size: 0.8rem; }
        .shift-type[data-type="Дневная"] { background: #fef3c7; color: #92400e; }
        .shift-type[data-type="Ночная"] { background: #e0e7ff; color: #3730a3; }
        .shift-type[data-type="Выходной"] { background: #fee2e2; color: #dc2626; }
        .shift-type[data-type="Суточная"] { background: #d1fae5; color: #065f46; }
        .shift-actions { display: flex; gap: 8px; }
        .btn-edit, .btn-delete, .btn-notify { background: none; border: none; font-size: 1.2rem; cursor: pointer; padding: 6px; border-radius: 8px; }
        .employees-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px; }
        .btn-primary { background: #667eea; color: white; padding: 10px 20px; border: none; border-radius: 10px; cursor: pointer; }
        .employees-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .employee-card { background: #f9f9f9; border-radius: 16px; padding: 16px; display: flex; align-items: center; gap: 15px; }
        .employee-avatar-large { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; align-items: center; justify-content: center; color: white; font-size: 1.8rem; font-weight: bold; cursor: pointer; }
        .employee-info { flex: 1; }
        .employee-name { font-weight: bold; font-size: 1.1rem; margin-bottom: 5px; }
        .report-selector { display: flex; gap: 12px; margin-bottom: 30px; flex-wrap: wrap; }
        .report-selector button { flex: 1; padding: 12px; background: #f3f4f6; border: none; border-radius: 12px; cursor: pointer; }
        .report-selector button.active { background: #667eea; color: white; }
        .report-panel { max-width: 500px; margin: 0 auto; }
        .report-result { margin-top: 30px; }
        .report-item { padding: 12px; background: #f9f9f9; margin-bottom: 8px; border-radius: 10px; border-left: 4px solid #667eea; display: flex; align-items: center; gap: 10px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; border: 1px solid #e5e7eb; border-radius: 18px; padding: 20px; text-align: center; }
        .stat-card .stat-icon { font-size: 2rem; margin-bottom: 8px; }
        .stat-card .stat-value { font-size: 1.8rem; font-weight: bold; }
        .workers-stats { background: #f9f9f9; padding: 20px; border-radius: 18px; }
        .worker-stat-item { padding: 12px; border-bottom: 1px solid #e5e7eb; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 10px; align-items: center; }
        .worker-stat-info { display: flex; align-items: center; gap: 10px; }
        .worker-stat-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .stat-badge { padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; }
        .stat-badge.day { background: #fef3c7; }
        .stat-badge.night { background: #e0e7ff; }
        .stat-badge.off { background: #fee2e2; }
        .stat-badge.round { background: #d1fae5; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 20px; padding: 24px; width: 90%; max-width: 400px; }
        .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .btn-save { background: #10b981; color: white; padding: 10px; border: none; border-radius: 10px; cursor: pointer; flex: 1; }
        .btn-cancel { background: #e5e7eb; padding: 10px; border: none; border-radius: 10px; cursor: pointer; flex: 1; }
        .notification-toggle { display: flex; align-items: center; gap: 10px; margin-top: 15px; padding: 10px; background: #f3f4f6; border-radius: 10px; }
        .empty { text-align: center; color: #9ca3af; padding: 40px; }
        @media (max-width: 640px) { .shift-types { flex-direction: column; } }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>📅 График смен PRO</h1>
        <div class="tabs">
            <button class="tab-btn active" data-tab="schedule">📝 График</button>
            <button class="tab-btn" data-tab="employees">👥 Сотрудники</button>
            <button class="tab-btn" data-tab="reports">📊 Отчеты</button>
            <button class="tab-btn" data-tab="stats">📈 Статистика</button>
        </div>
    </header>

    <div id="schedule" class="tab-content active">
        <div class="schedule-grid">
            <div class="calendar-section">
                <h3>📅 Календарь</h3>
                <input type="date" id="datePicker" style="font-size: 1.1rem; padding: 12px; width: 100%;">
                <div class="selected-date" id="selectedDateDisplay"></div>
                <div class="notification-toggle">
                    <label><input type="checkbox" id="notificationsEnabled"> 🔔 Включить напоминания</label>
                </div>
            </div>
            <div class="add-shift-section">
                <h3>➕ Добавить смену</h3>
                <select id="workerSelect" class="worker-select"><option value="">-- Выберите сотрудника --</option></select>
                <div class="shift-types">
                    <button class="shift-type-btn active" data-type="Дневная">☀️ Дневная</button>
                    <button class="shift-type-btn" data-type="Ночная">🌙 Ночная</button>
                    <button class="shift-type-btn" data-type="Выходной">😴 Выходной</button>
                    <button class="shift-type-btn" data-type="Суточная">🔄 Суточная</button>
                </div>
                <button class="btn-add" id="addShiftBtn">➕ Добавить смену</button>
            </div>
            <div class="import-export-section">
                <button id="exportExcelBtn">📊 Экспорт Excel</button>
                <button id="exportPdfBtn">📄 Экспорт PDF</button>
                <button id="googleCalendarBtn" class="google-cal-btn">📅 Google Календарь</button>
            </div>
            <div class="shifts-list">
                <h3>📋 Все смены (<span id="totalCount">0</span>)</h3>
                <div id="shiftsContainer" class="shifts-grid"></div>
            </div>
        </div>
    </div>

    <div id="employees" class="tab-content">
        <div class="employees-header">
            <h3>👥 Список сотрудников</h3>
            <div style="display: flex; gap: 10px;">
                <button class="btn-primary" id="importExcelBtn">📂 Импорт Excel</button>
                <button class="btn-primary" id="addEmployeeBtn">➕ Добавить</button>
            </div>
        </div>
        <div id="employeesContainer" class="employees-grid"></div>
    </div>

    <div id="reports" class="tab-content">
        <div class="report-selector">
            <button class="report-type-btn active" data-report="date">📅 По дате</button>
            <button class="report-type-btn" data-report="worker">👤 По сотруднику</button>
        </div>
        <div id="dateReport" class="report-panel">
            <label>Выберите дату:</label>
            <input type="date" id="reportDate">
            <div id="dateReportResult" class="report-result"></div>
        </div>
        <div id="workerReport" class="report-panel" style="display: none;">
            <label>Выберите сотрудника:</label>
            <select id="reportWorkerSelect"><option value="">-- Выберите --</option></select>
            <div id="workerReportResult" class="report-result"></div>
        </div>
    </div>

    <div id="stats" class="tab-content">
        <div id="statsContainer"></div>
    </div>
</div>

<div id="employeeModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">Добавить сотрудника</h3>
        <input type="text" id="employeeNameInput" placeholder="ФИО сотрудника">
        <input type="file" id="employeeAvatarInput" accept="image/*">
        <div class="modal-buttons">
            <button class="btn-save" id="saveEmployeeBtn">Сохранить</button>
            <button class="btn-cancel" id="cancelEmployeeBtn">Отмена</button>
        </div>
    </div>
</div>

<script>
    // Простая реализация XLSX (без внешних зависимостей - только базовая функциональность)
    let shifts = JSON.parse(localStorage.getItem('shift_scheduler') || '[]');
    let employees = JSON.parse(localStorage.getItem('employees') || '[{"id":"1","name":"Иванов Иван","avatar":null},{"id":"2","name":"Петров Петр","avatar":null}]');
    let notificationsEnabled = localStorage.getItem('notifications_enabled') === 'true';
    
    function saveAll() {
        localStorage.setItem('shift_scheduler', JSON.stringify(shifts));
        localStorage.setItem('employees', JSON.stringify(employees));
        localStorage.setItem('notifications_enabled', notificationsEnabled);
        renderAll();
    }
    
    function formatDate(dateStr) { let [y,m,d]=dateStr.split('-'); return `${d}.${m}.${y}`; }
    function getInitials(name) { return name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2); }
    function getEmployeeName(id) { let e=employees.find(e=>e.id==id); return e?e.name:id; }
    function getEmployeeAvatar(id) { let e=employees.find(e=>e.id==id); return e?.avatar||null; }
    
    function renderAll() {
        // Рендер списка смен
        let container = document.getElementById('shiftsContainer');
        if(shifts.length===0) container.innerHTML='<p class="empty">Нет смен</p>';
        else container.innerHTML=shifts.map(s=>`<div class="shift-card" data-type="${s.shiftType}"><div class="shift-info">${getEmployeeAvatar(s.employeeId)?`<img src="${getEmployeeAvatar(s.employeeId)}" class="worker-avatar">`:`<div class="worker-avatar">${getInitials(getEmployeeName(s.employeeId))}</div>`}<div class="shift-details"><div class="shift-date">${formatDate(s.date)}</div><div class="shift-worker">${escapeHtml(getEmployeeName(s.employeeId))}</div><div class="shift-type" data-type="${s.shiftType}">${s.shiftType}</div></div></div><div class="shift-actions"><button class="btn-notify" onclick="notifyShift('${s.id}')">🔔</button><button class="btn-edit" onclick="editShift('${s.id}')">✏️</button><button class="btn-delete" onclick="deleteShift('${s.id}')">🗑️</button></div></div>`).join('');
        
        // Рендер списка сотрудников
        let empContainer = document.getElementById('employeesContainer');
        if(employees.length===0) empContainer.innerHTML='<p class="empty">Нет сотрудников</p>';
        else empContainer.innerHTML=employees.map(e=>`<div class="employee-card"><div class="employee-avatar-large" onclick="uploadAvatar('${e.id}')">${e.avatar?`<img src="${e.avatar}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`:getInitials(e.name)}</div><div class="employee-info"><div class="employee-name">${escapeHtml(e.name)}</div><div class="employee-stats">Смен: ${shifts.filter(s=>s.employeeId==e.id).length}</div></div><div class="employee-actions"><button class="btn-edit" onclick="editEmployee('${e.id}')">✏️</button><button class="btn-delete" onclick="deleteEmployee('${e.id}')">🗑️</button></div></div>`).join('');
        
        // Статистика
        let statsHtml=`<div class="stats-grid"><div class="stat-card"><div class="stat-icon">📊</div><div class="stat-value">${shifts.length}</div><div class="stat-label">Всего смен</div></div><div class="stat-card"><div class="stat-icon">👥</div><div class="stat-value">${employees.length}</div><div class="stat-label">Сотрудников</div></div><div class="stat-card"><div class="stat-icon">☀️</div><div class="stat-value">${shifts.filter(s=>s.shiftType=='Дневная').length}</div></div><div class="stat-card"><div class="stat-icon">🌙</div><div class="stat-value">${shifts.filter(s=>s.shiftType=='Ночная').length}</div></div><div class="stat-card"><div class="stat-icon">😴</div><div class="stat-value">${shifts.filter(s=>s.shiftType=='Выходной').length}</div></div><div class="stat-card"><div class="stat-icon">🔄</div><div class="stat-value">${shifts.filter(s=>s.shiftType=='Суточная').length}</div></div></div><div class="workers-stats"><h3>По сотрудникам</h3>${employees.map(e=>{let es=shifts.filter(s=>s.employeeId==e.id); return `<div class="worker-stat-item"><div class="worker-stat-info">${e.avatar?`<img src="${e.avatar}" class="worker-stat-avatar">`:`<div style="width:40px;height:40px;border-radius:50%;background:#667eea;display:flex;align-items:center;justify-content:center;color:white;">${getInitials(e.name)}</div>`}<div>${escapeHtml(e.name)}</div></div><div><span class="stat-badge day">☀️ ${es.filter(s=>s.shiftType=='Дневная').length}</span> <span class="stat-badge night">🌙 ${es.filter(s=>s.shiftType=='Ночная').length}</span> <span class="stat-badge off">😴 ${es.filter(s=>s.shiftType=='Выходной').length}</span> <span class="stat-badge round">🔄 ${es.filter(s=>s.shiftType=='Суточная').length}</span></div></div>`}).join('')}</div>`;
        document.getElementById('statsContainer').innerHTML=statsHtml;
        
        // Обновление выпадающих списков
        let opts = employees.map(e=>`<option value="${e.id}">${escapeHtml(e.name)}</option>`).join('');
        document.getElementById('workerSelect').innerHTML = '<option value="">-- Выберите --</option>'+opts;
        document.getElementById('reportWorkerSelect').innerHTML = '<option value="">-- Выберите --</option>'+opts;
        document.getElementById('totalCount').innerText = shifts.length;
        if(document.getElementById('datePicker').value) document.getElementById('selectedDateDisplay').innerHTML = `Выбрано: ${formatDate(document.getElementById('datePicker').value)}`;
    }
    
    function escapeHtml(str) { return String(str).replace(/[&<>]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    
    window.deleteShift = function(id) { if(confirm('Удалить?')) { shifts=shifts.filter(s=>s.id!=id); saveAll(); } };
    window.editShift = function(id) { let s=shifts.find(s=>s.id==id); if(s){ let nt=prompt('Тип смены (Дневная/Ночная/Выходной/Суточная):',s.shiftType); if(nt && ['Дневная','Ночная','Выходной','Суточная'].includes(nt)){ s.shiftType=nt; saveAll(); } } };
    window.notifyShift = function(id) { let s=shifts.find(s=>s.id==id); if(s && notificationsEnabled) alert(`🔔 Напоминание: ${getEmployeeName(s.employeeId)} - ${s.shiftType} смена ${formatDate(s.date)}`); else if(!notificationsEnabled) alert('Включите уведомления в настройках'); };
    
    function addShift() {
        let date=document.getElementById('datePicker').value;
        let empId=document.getElementById('workerSelect').value;
        let typeBtn=document.querySelector('.shift-type-btn.active');
        let type=typeBtn?typeBtn.getAttribute('data-type'):'Дневная';
        if(!date){ alert('Выберите дату'); return; }
        if(!empId){ alert('Выберите сотрудника'); return; }
        shifts.unshift({id:Date.now().toString(), date, employeeId:empId, shiftType:type});
        saveAll();
    }
    
    let editingId=null;
    function openModal(id=null) { editingId=id; let m=document.getElementById('employeeModal'); document.getElementById('modalTitle').innerText=id?'Редактировать':'Добавить'; document.getElementById('employeeNameInput').value=id?employees.find(e=>e.id==id).name:''; document.getElementById('employeeAvatarInput').value=''; m.classList.add('active'); }
    function saveEmployee() { let name=document.getElementById('employeeNameInput').value.trim(); if(!name){ alert('Введите имя'); return; } let file=document.getElementById('employeeAvatarInput').files[0]; let save=(avatar)=>{ if(editingId){ let e=employees.find(e=>e.id==editingId); e.name=name; if(avatar) e.avatar=avatar; } else { employees.push({id:Date.now().toString(), name, avatar:avatar||null}); } saveAll(); document.getElementById('employeeModal').classList.remove('active'); }; if(file){ let r=new FileReader(); r.onload=e=>save(e.target.result); r.readAsDataURL(file); } else save(null); }
    window.uploadAvatar=function(id){ let inp=document.createElement('input'); inp.type='file'; inp.accept='image/*'; inp.onchange=e=>{ let f=e.target.files[0]; if(f){ let r=new FileReader(); r.onload=ev=>{ let emp=employees.find(e=>e.id==id); if(emp) emp.avatar=ev.target.result; saveAll(); }; r.readAsDataURL(f); } }; inp.click(); };
    window.editEmployee=id=>openModal(id);
    window.deleteEmployee=function(id){ if(confirm('Удалить сотрудника и все его смены?')){ employees=employees.filter(e=>e.id!=id); shifts=shifts.filter(s=>s.employeeId!=id); saveAll(); } };
    
    function importExcel() { alert('Для импорта Excel используйте онлайн-версию или откройте файл через локальный сервер.\n\nПроще: скопируйте данные из Excel вручную или используйте кнопку "Добавить сотрудника"'); }
    function exportExcel() { let data = shifts.map(s=>({Дата:formatDate(s.date), Работник:getEmployeeName(s.employeeId), 'Тип смены':s.shiftType})); let csv = 'Дата,Работник,Тип смены\n'+data.map(d=>`${d.Дата},${d.Работник},${d['Тип смены']}`).join('\n'); let blob=new Blob(["\uFEFF"+csv],{type:'text/csv;charset=utf-8;'}); let a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`график_${new Date().toISOString().split('T')[0]}.csv`; a.click(); URL.revokeObjectURL(a.href); alert('CSV файл сохранён (можно открыть в Excel)'); }
    function exportPDF() { alert('Для PDF используйте "Печать" в браузере (Ctrl+P) и выберите "Сохранить как PDF"'); }
    function googleCalendar() { if(shifts.length===0) alert('Нет смен'); else window.open(`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent('График смен')}&dates=${shifts[0].date.replace(/-/g,'')}/${shifts[shifts.length-1].date.replace(/-/g,'')}`, '_blank'); }
    
    function showDateReport() { let d=document.getElementById('reportDate').value; if(!d) return; let f=shifts.filter(s=>s.date==d); let r=document.getElementById('dateReportResult'); if(f.length===0) r.innerHTML='<p>Нет смен</p>'; else r.innerHTML=`<div class="report-summary">Всего: ${f.length}</div>`+f.map(s=>`<div class="report-item">👤 ${escapeHtml(getEmployeeName(s.employeeId))} — ${s.shiftType}</div>`).join(''); }
    function showWorkerReport() { let id=document.getElementById('reportWorkerSelect').value; if(!id) return; let f=shifts.filter(s=>s.employeeId==id); let r=document.getElementById('workerReportResult'); if(f.length===0) r.innerHTML='<p>Нет смен</p>'; else r.innerHTML=`<div class="report-summary">Всего: ${f.length}</div>`+f.map(s=>`<div class="report-item">📅 ${formatDate(s.date)} — ${s.shiftType}</div>`).join(''); }
    
    function toggleNotif(e) { notificationsEnabled=e.target.checked; localStorage.setItem('notifications_enabled', notificationsEnabled); alert(notificationsEnabled?'Уведомления включены (будут показываться как всплывающие окна)':'Уведомления выключены'); }
    
    document.getElementById('addShiftBtn').addEventListener('click', addShift);
    document.getElementById('addEmployeeBtn').addEventListener('click', ()=>openModal());
    document.getElementById('saveEmployeeBtn').addEventListener('click', saveEmployee);
    document.getElementById('cancelEmployeeBtn').addEventListener('click', ()=>document.getElementById('employeeModal').classList.remove('active'));
    document.getElementById('importExcelBtn').addEventListener('click', importExcel);
    document.getElementById('exportExcelBtn').addEventListener('click', exportExcel);
    document.getElementById('exportPdfBtn').addEventListener('click', exportPDF);
    document.getElementById('googleCalendarBtn').addEventListener('click', googleCalendar);
    document.getElementById('notificationsEnabled').addEventListener('change', toggleNotif);
    document.getElementById('reportDate').addEventListener('change', showDateReport);
    document.getElementById('reportWorkerSelect').addEventListener('change', showWorkerReport);
    document.querySelectorAll('.shift-type-btn').forEach(b=>b.addEventListener('click', function(){ document.querySelectorAll('.shift-type-btn').forEach(btn=>btn.classList.remove('active')); this.classList.add('active'); }));
    document.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click', function(){ let tid=this.getAttribute('data-tab'); document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active')); document.querySelectorAll('.tab-btn').forEach(btn=>btn.classList.remove('active')); document.getElementById(tid).classList.add('active'); this.classList.add('active'); renderAll(); }));
    document.querySelectorAll('.report-type-btn').forEach(b=>b.addEventListener('click', function(){ let rt=this.getAttribute('data-report'); document.querySelectorAll('.report-type-btn').forEach(btn=>btn.classList.remove('active')); this.classList.add('active'); document.getElementById('dateReport').style.display=rt=='date'?'block':'none'; document.getElementById('workerReport').style.display=rt=='worker'?'block':'none'; }));
    document.getElementById('employeeModal').addEventListener('click', e=>{ if(e.target===e.currentTarget) e.currentTarget.classList.remove('active'); });
    
    let today = new Date().toISOString().split('T')[0];
    document.getElementById('datePicker').value = today;
    renderAll();
</script>
</body>
</html>
